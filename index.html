<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세탁기 진동계 · 설계변수 3D 뷰어</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F9FC; --panel:#FFFFFF; --ink:#0F1B2D; --muted:#64748B;
  --line:#E4EAF2; --accent:#2563EB; --accent-soft:#EFF4FE;
  --spring:#2563EB; --damper:#0D9488; --tub:#94A3B8; --drum:#1E293B;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Pretendard',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
.app{display:grid;grid-template-columns:330px 1fr;height:100vh}

.panel{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;display:flex;flex-direction:column}
.panel::-webkit-scrollbar{width:7px}
.panel::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
.phead{padding:16px 18px 13px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:3}
.phead .ey{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
.phead h1{font-size:15.5px;font-weight:800;margin-top:5px;letter-spacing:-.01em}
.phead p{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}

/* 아코디언 */
.acc{border-bottom:1px solid var(--line)}
.acc-h{display:flex;align-items:center;gap:9px;padding:12px 18px;cursor:pointer;user-select:none;font-size:12px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--ink)}
.acc-h:hover{background:#FAFBFD}
.acc-h .dot{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
.dot.s{background:var(--spring)} .dot.d{background:var(--damper)} .dot.g{background:var(--tub)}
.acc-h .cnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--muted)}
.acc-h .chev{transition:transform .2s;color:var(--muted);font-size:11px}
.acc.open .acc-h .chev{transform:rotate(90deg)}
.acc-body{display:none;padding:4px 18px 14px}
.acc.open .acc-body{display:block}

.sub{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin:12px 0 8px;display:flex;align-items:center;gap:6px}
.sub::after{content:'';flex:1;height:1px;background:var(--line)}

.ctrl{margin-bottom:11px}
.ctrl-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.ctrl-h label{font-size:12px;font-weight:600;color:var(--ink)}
.ctrl-h .val{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;color:var(--accent)}
.ctrl-h .val .u{color:var(--muted);font-weight:400;font-size:9.5px;margin-left:1px}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:3px;background:var(--line);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(37,99,235,.4)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff}
select{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--ink);background:#fff;cursor:pointer}

.pfoot{position:sticky;bottom:0;background:var(--panel);padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px}
.btn{flex:1;padding:9px;border:1px solid var(--line);border-radius:9px;background:#fff;font-family:inherit;font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.stage{position:relative;background:linear-gradient(160deg,#FBFCFE,#EEF3FA 60%,#E3EAF4)}
#cv{display:block;width:100%;height:100%}
.hint{position:absolute;left:16px;bottom:14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);background:rgba(255,255,255,.7);backdrop-filter:blur(4px);padding:6px 11px;border-radius:7px;border:1px solid var(--line);line-height:1.6}
.hint b{color:var(--ink)}
.tag{position:absolute;right:16px;top:14px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--accent);background:var(--accent-soft);padding:5px 11px;border-radius:999px;text-transform:uppercase}
.legend{position:absolute;left:16px;top:14px;display:flex;flex-direction:column;gap:6px;background:rgba(255,255,255,.78);backdrop-filter:blur(4px);padding:10px 13px;border-radius:9px;border:1px solid var(--line)}
.legend .li{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--ink)}
.legend .sw{width:13px;height:13px;border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <aside class="panel">
    <div class="phead">
      <div class="ey">VIBRATION · PARAMETRIC</div>
      <h1>세탁기 진동계 3D</h1>
      <p>위치·치수·방향·타입 설계변수가 형상에 직접 반영됩니다.</p>
    </div>

    <!-- 드럼·터브 -->
    <div class="acc open" data-acc>
      <div class="acc-h"><span class="dot g"></span>드럼 · 터브<span class="cnt">4</span><span class="chev">▶</span></div>
      <div class="acc-body">
        <div class="ctrl"><div class="ctrl-h"><label>드럼 반경</label><span class="val" id="vDrumR">330<span class="u">mm</span></span></div><input type="range" id="DrumR" min="280" max="370" value="330" step="1"></div>
        <div class="ctrl"><div class="ctrl-h"><label>틸팅 각도</label><span class="val" id="vTilt">10<span class="u">°</span></span></div><input type="range" id="Tilt" min="0" max="20" value="10" step="0.5"></div>
        <div class="ctrl"><div class="ctrl-h"><label>드럼 질량</label><span class="val" id="vDrumM">14.0<span class="u">kg</span></span></div><input type="range" id="DrumM" min="8" max="20" value="14" step="0.1"></div>
        <div class="ctrl"><div class="ctrl-h"><label>터브 질량</label><span class="val" id="vTubM">35.7<span class="u">kg</span></span></div><input type="range" id="TubM" min="20" max="50" value="35.7" step="0.1"></div>
      </div>
    </div>

    <!-- 스프링 좌우 -->
    <div class="acc open" data-acc>
      <div class="acc-h"><span class="dot s"></span>서스펜션 스프링<span class="cnt">L/R</span><span class="chev">▶</span></div>
      <div class="acc-body">
        <div class="sub">우측 (Right)</div>
        <div class="ctrl"><div class="ctrl-h"><label>설치 길이</label><span class="val" id="vSpR_l">302<span class="u">mm</span></span></div><input type="range" id="SpR_l" min="250" max="350" value="302" step="1"></div>
        <div class="ctrl"><div class="ctrl-h"><label>설치 각도</label><span class="val" id="vSpR_a">88<span class="u">°</span></span></div><input type="range" id="SpR_a" min="70" max="100" value="88" step="0.5"></div>
        <div class="ctrl"><div class="ctrl-h"><label>강성 K</label><span class="val" id="vSpR_f">11.7<span class="u">kgf/mm</span></span></div><input type="range" id="SpR_f" min="5" max="20" value="11.7" step="0.1"></div>
        <div class="sub">좌측 (Left)</div>
        <div class="ctrl"><div class="ctrl-h"><label>설치 길이</label><span class="val" id="vSpL_l">302<span class="u">mm</span></span></div><input type="range" id="SpL_l" min="250" max="350" value="302" step="1"></div>
        <div class="ctrl"><div class="ctrl-h"><label>설치 각도</label><span class="val" id="vSpL_a">88<span class="u">°</span></span></div><input type="range" id="SpL_a" min="70" max="100" value="88" step="0.5"></div>
        <div class="ctrl"><div class="ctrl-h"><label>강성 K</label><span class="val" id="vSpL_f">11.7<span class="u">kgf/mm</span></span></div><input type="range" id="SpL_f" min="5" max="20" value="11.7" step="0.1"></div>
      </div>
    </div>

    <!-- 댐퍼 4개 -->
    <div class="acc" data-acc>
      <div class="acc-h"><span class="dot d"></span>댐퍼 (4점)<span class="cnt">FR·FL·RR·RL</span><span class="chev">▶</span></div>
      <div class="acc-body" id="damperBody"></div>
    </div>

    <div class="acc" data-acc>
      <div class="acc-h"><span class="dot d"></span>댐퍼 부싱 (조인트)<span class="cnt">6</span><span class="chev">▶</span></div>
      <div class="acc-body" id="bushBody"></div>
    </div>
    <div class="acc" data-acc>
      <div class="acc-h"><span class="dot d"></span>가스켓<span class="cnt">6</span><span class="chev">▶</span></div>
      <div class="acc-body" id="gaskBody"></div>
    </div>
    <div class="acc" data-acc>
      <div class="acc-h"><span class="dot s"></span>TDS 보조댐퍼<span class="cnt">L/R</span><span class="chev">▶</span></div>
      <div class="acc-body" id="tdsBody"></div>
    </div>

    <div class="pfoot">
      <button class="btn" id="btnVib">▶ 진동</button>
      <button class="btn" id="btnReset">↺ 시점</button>
    </div>
  </aside>

  <main class="stage">
    <canvas id="cv"></canvas>
    <div class="tag">R290 HPWD · 진동계</div>
    <div class="legend">
      <div class="li"><span class="sw" style="background:#1E293B"></span>드럼</div>
      <div class="li"><span class="sw" style="background:#94A3B8"></span>터브</div>
      <div class="li"><span class="sw" style="background:#2563EB"></span>스프링</div>
      <div class="li"><span class="sw" style="background:#0D9488"></span>댐퍼</div>
    </div>
    <div class="hint">드래그 <b>회전</b> · 휠 <b>줌</b> · 슬라이더로 <b>설계변수</b></div>
  </main>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const cv=document.getElementById('cv'), stage=cv.parentElement;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,1,1,8000);
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
scene.add(new THREE.AmbientLight(0xffffff,0.72));
const key=new THREE.DirectionalLight(0xffffff,0.85);key.position.set(600,900,700);scene.add(key);
const fill=new THREE.DirectionalLight(0x9db4d6,0.35);fill.position.set(-500,200,-400);scene.add(fill);

const matCab=new THREE.LineBasicMaterial({color:0xb6c2d4});
const matTub=new THREE.MeshStandardMaterial({color:0x94a3b8,transparent:true,opacity:0.30,roughness:0.6,metalness:0.1,side:THREE.DoubleSide});
const matDrum=new THREE.MeshStandardMaterial({color:0x1e293b,roughness:0.45,metalness:0.25});
const matDrumLine=new THREE.LineBasicMaterial({color:0x475569});
const matSpring=new THREE.MeshStandardMaterial({color:0x2563eb,roughness:0.35,metalness:0.4});
const matDamperBody=new THREE.MeshStandardMaterial({color:0x0d9488,roughness:0.4,metalness:0.35});
const matDamperRod=new THREE.MeshStandardMaterial({color:0xcbd5e1,roughness:0.3,metalness:0.6});

const root=new THREE.Group();scene.add(root);
const tubGroup=new THREE.Group();root.add(tubGroup);
const suspGroup=new THREE.Group();root.add(suspGroup);
const mountGroup=new THREE.Group();root.add(mountGroup);
const CAB={w:700,h:850,d:700};

// 댐퍼 4점 정의 + 패널 동적 생성
const DAMPERS=[{id:'FR',label:'전우',sx:1,sz:1},{id:'FL',label:'전좌',sx:-1,sz:1},{id:'RR',label:'후우',sx:1,sz:-1},{id:'RL',label:'후좌',sx:-1,sz:-1}];
const damperBody=document.getElementById('damperBody');
DAMPERS.forEach(d=>{
  damperBody.insertAdjacentHTML('beforeend',
    '<div class="sub">'+d.label+' ('+d.id+')</div>'+
    '<div class="ctrl"><div class="ctrl-h"><label>설치 길이</label><span class="val" id="vD_'+d.id+'_l">210<span class="u">mm</span></span></div><input type="range" id="D_'+d.id+'_l" min="170" max="250" value="210" step="1"></div>'+
    '<div class="ctrl"><div class="ctrl-h"><label>설치 각도</label><span class="val" id="vD_'+d.id+'_a">65<span class="u">°</span></span></div><input type="range" id="D_'+d.id+'_a" min="45" max="90" value="65" step="0.5"></div>'+
    '<div class="ctrl"><div class="ctrl-h"><label>댐핑력</label><span class="val" id="vD_'+d.id+'_f">65<span class="u">N</span></span></div><input type="range" id="D_'+d.id+'_f" min="20" max="120" value="65" step="1"></div>'+
    '<div class="ctrl"><div class="ctrl-h"><label>타입</label></div><select id="D_'+d.id+'_t"><option value="2stg">2단 (2stg)</option><option value="fric">마찰 (fric)</option></select></div>');
});
function sl(id,label,unit,min,max,v,step,dec){return '<div class="ctrl"><div class="ctrl-h"><label>'+label+'</label><span class="val" id="v'+id+'">'+(+v).toFixed(dec)+'<span class="u">'+unit+'</span></span></div><input type="range" id="'+id+'" min="'+min+'" max="'+max+'" value="'+v+'" step="'+step+'"></div>';}
const BUSH=[['BuKX','Kx','N/mm',10000,150000,95000,1000,0],['BuKY','Ky','N/mm',5000,80000,30000,1000,0],['BuKZ','Kz','N/mm',5000,40000,13000,1000,0],['BuCX','Cx','N·s/mm',100,1500,750,10,0],['BuCY','Cy','N·s/mm',100,1500,900,10,0],['BuCZ','Cz','N·s/mm',100,1500,500,10,0]];
const GASK=[['GkKx','Kx','N/mm',1,10,4,0.1,1],['GkKy','Ky','N/mm',1,10,4,0.1,1],['GkKz','Kz','N/mm',1,10,4,0.1,1],['GkCx','Cx','N·s/mm',0.01,0.1,0.02,0.005,3],['GkCy','Cy','N·s/mm',0.01,0.1,0.02,0.005,3],['GkCz','Cz','N·s/mm',0.01,0.1,0.05,0.005,3]];
const TDSL=[{id:'R',label:'우측 (Right)'},{id:'L',label:'좌측 (Left)'}];
document.getElementById('bushBody').innerHTML=BUSH.map(b=>sl(b[0],b[1],b[2],b[3],b[4],b[5],b[6],b[7])).join('');
document.getElementById('gaskBody').innerHTML=GASK.map(b=>sl(b[0],b[1],b[2],b[3],b[4],b[5],b[6],b[7])).join('');
document.getElementById('tdsBody').innerHTML=TDSL.map(t=>'<div class="sub">'+t.label+'</div>'+'<div class="ctrl"><div class="ctrl-h"><label>타입</label></div><select id="Tds_'+t.id+'_t"><option value="none">없음</option><option value="fric">마찰</option><option value="2stg">2단</option></select></div>'+sl('Tds_'+t.id+'_f','댐핑력','N',0,100,0,1,0)+sl('Tds_'+t.id+'_l','설치 길이','mm',150,250,200,1,0)+sl('Tds_'+t.id+'_a','설치 각도','°',45,90,70,0.5,1)).join('');

function clearGroup(g){while(g.children.length){const c=g.children.pop();if(c.geometry)c.geometry.dispose();g.remove(c);}}
function buildCabinet(){root.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(CAB.w,CAB.h,CAB.d)),matCab));}
function cylBetween(a,b,r,mat){
  const dir=new THREE.Vector3().subVectors(b,a),len=dir.length()||1;
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,18),mat);
  m.position.copy(a).addScaledVector(dir,0.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());
  return m;
}
function springMesh(a,b,coils,coilR,wireR){
  const axis=new THREE.Vector3().subVectors(b,a),len=axis.length()||1,up=axis.clone().normalize();
  let perp=new THREE.Vector3(1,0,0);if(Math.abs(up.x)>0.85)perp.set(0,0,1);
  const u=new THREE.Vector3().crossVectors(up,perp).normalize(),v=new THREE.Vector3().crossVectors(up,u).normalize();
  const seg=Math.max(40,Math.floor(coils*18)),pts=[];
  for(let i=0;i<=seg;i++){const t=i/seg,ang=t*coils*Math.PI*2;
    pts.push(new THREE.Vector3().copy(a).addScaledVector(up,len*t).addScaledVector(u,Math.cos(ang)*coilR).addScaledVector(v,Math.sin(ang)*coilR));}
  return new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),seg,wireR,8,false),matSpring);
}

function val(id){return document.getElementById(id).value;}
const P={};
function readParams(){
  P.drumR=+val('DrumR');P.tilt=+val('Tilt');
  P.SpR_l=+val('SpR_l');P.SpR_a=+val('SpR_a');P.SpR_f=+val('SpR_f');
  P.SpL_l=+val('SpL_l');P.SpL_a=+val('SpL_a');P.SpL_f=+val('SpL_f');
  P.drumMass=+val('DrumM');P.tubMass=+val('TubM');
  DAMPERS.forEach(d=>{P['D_'+d.id+'_l']=+val('D_'+d.id+'_l');P['D_'+d.id+'_a']=+val('D_'+d.id+'_a');P['D_'+d.id+'_t']=val('D_'+d.id+'_t');P['D_'+d.id+'_f']=+val('D_'+d.id+'_f');});
  BUSH.concat(GASK).forEach(b=>P[b[0]]=+val(b[0]));
  TDSL.forEach(t=>{P['Tds_'+t.id+'_t']=val('Tds_'+t.id+'_t');P['Tds_'+t.id+'_f']=+val('Tds_'+t.id+'_f');P['Tds_'+t.id+'_l']=+val('Tds_'+t.id+'_l');P['Tds_'+t.id+'_a']=+val('Tds_'+t.id+'_a');});
}

function tiltPt(p){return p.clone().applyAxisAngle(new THREE.Vector3(1,0,0),-P.tilt*Math.PI/180);}
function buildTubDrum(){
  clearGroup(tubGroup);
  matDrum.color.setHSL(0.60,0.30,0.24-(P.drumMass-8)/12*0.10);
  matTub.opacity=0.20+(P.tubMass-20)/30*0.22;
  const tubR=P.drumR+38,tubL=480;
  const tub=new THREE.Mesh(new THREE.CylinderGeometry(tubR,tubR,tubL,40,1,true),matTub);tub.rotation.x=Math.PI/2;tubGroup.add(tub);
  const drum=new THREE.Mesh(new THREE.CylinderGeometry(P.drumR,P.drumR,tubL-46,40,1,true),matDrum);drum.rotation.x=Math.PI/2;tubGroup.add(drum);
  const dl=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.CylinderGeometry(P.drumR,P.drumR,tubL-46,24,1,true)),matDrumLine);dl.rotation.x=Math.PI/2;tubGroup.add(dl);
  const rim=new THREE.Mesh(new THREE.TorusGeometry(P.drumR,9,12,40),matDrum);rim.position.z=(tubL-46)/2;tubGroup.add(rim);
  tubGroup.rotation.x=-P.tilt*Math.PI/180;
  tubGroup.userData.tubR=tubR;
}

function buildSusp(){
  clearGroup(suspGroup);
  const tubR=tubGroup.userData.tubR||P.drumR+38;
  // 스프링 좌우 개별
  [['R',1,P.SpR_l,P.SpR_a,P.SpR_f],['L',-1,P.SpL_l,P.SpL_a,P.SpL_f]].forEach(arr=>{
    const sx=arr[1],len=arr[2],ang=arr[3],force=arr[4];
    const coils=Math.round(5+(force-5)/15*4),wireR=4.5+(force-5)/15*4;
    const bot0=new THREE.Vector3(sx*150,tubR-10,-70);
    const th=(90-ang)*Math.PI/180;
    const top=new THREE.Vector3(bot0.x+sx*Math.sin(th)*len,bot0.y+Math.cos(th)*len,bot0.z);
    const bot=tiltPt(bot0);
    suspGroup.add(springMesh(bot,top,coils,20,wireR));
    [bot,top].forEach(p=>{const s=new THREE.Mesh(new THREE.SphereGeometry(11,12,12),matSpring);s.position.copy(p);suspGroup.add(s);});
  });
  // 댐퍼 4개 개별 + 타입
  DAMPERS.forEach(d=>{
    const len=P['D_'+d.id+'_l'],ang=P['D_'+d.id+'_a'],type=P['D_'+d.id+'_t'];
    const top0=new THREE.Vector3(d.sx*140,-(tubR-20),d.sz*150);
    const th=(90-ang)*Math.PI/180;
    const base=new THREE.Vector3(top0.x+d.sx*Math.sin(th)*len,top0.y-Math.cos(th)*len,top0.z);
    const top=tiltPt(top0);
    const bodyR=7+(P['D_'+d.id+'_f']-20)/100*7;
    if(type==='2stg'){
      const mid=new THREE.Vector3().lerpVectors(base,top,0.6);
      suspGroup.add(cylBetween(base,mid,bodyR,matDamperBody));
      suspGroup.add(cylBetween(mid,top,bodyR*0.4,matDamperRod));
    }else{
      suspGroup.add(cylBetween(base,top,bodyR*0.72,matDamperBody));
    }
    [top,base].forEach(p=>{const s=new THREE.Mesh(new THREE.SphereGeometry(9,12,12),matDamperBody);s.position.copy(p);suspGroup.add(s);});
  });
}

function buildMounts(){
  clearGroup(mountGroup);
  const tubR=tubGroup.userData.tubR||P.drumR+38,tubL=480;
  // 댐퍼 부싱: 댐퍼 4점 조인트(양 끝)에 강성 타원체, KX/KY/KZ -> 3축 반경, C평균 -> 색
  const bex=0.55+(P.BuKX-10000)/140000*1.3,bey=0.55+(P.BuKY-5000)/75000*1.3,bez=0.55+(P.BuKZ-5000)/35000*1.3;
  const bc=(P.BuCX+P.BuCY+P.BuCZ)/3;
  const buMat=new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.09,0.72,0.62-bc/1500*0.26),roughness:0.55,transparent:true,opacity:0.88});
  DAMPERS.forEach(d=>{
    const dl=P['D_'+d.id+'_l'],da=P['D_'+d.id+'_a'];
    const top0=new THREE.Vector3(d.sx*140,-(tubR-20),d.sz*150);
    const th=(90-da)*Math.PI/180;
    const base=new THREE.Vector3(top0.x+d.sx*Math.sin(th)*dl,top0.y-Math.cos(th)*dl,top0.z);
    const top=tiltPt(top0);
    [top,base].forEach(pt=>{const e=new THREE.Mesh(new THREE.SphereGeometry(13,16,12),buMat);e.scale.set(bex,bey,bez);e.position.copy(pt);mountGroup.add(e);});
  });
  // 가스켓: 전면 링, K평균 -> 두께, C평균 -> 색
  const gk=(P.GkKx+P.GkKy+P.GkKz)/3,gc=(P.GkCx+P.GkCy+P.GkCz)/3;
  const gThk=5+(gk-1)/9*7;
  const gkMat=new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.0,0.55,0.62-gc/0.1*0.18),roughness:0.55});
  const gkM=new THREE.Mesh(new THREE.TorusGeometry(P.drumR+5,gThk,12,44),gkMat);
  gkM.position.z=tubL/2-8;tubGroup.add(gkM);
  // TDS 좌우 보조댐퍼 (type!=none), force -> 굵기
  [['R',1],['L',-1]].forEach(a=>{
    const id=a[0],sgn=a[1],type=P['Tds_'+id+'_t'];
    if(type==='none')return;
    const len=P['Tds_'+id+'_l'],ang=P['Tds_'+id+'_a'],force=P['Tds_'+id+'_f'];
    const top=new THREE.Vector3(sgn*(tubR-6),-40,75);
    const th=(90-ang)*Math.PI/180;
    const base=new THREE.Vector3(top.x+sgn*Math.sin(th)*len,top.y-Math.cos(th)*len,top.z);
    const r=5+force/100*6;
    const tMat=new THREE.MeshStandardMaterial({color:0x7c3aed,roughness:0.4,metalness:0.3});
    if(type==='2stg'){const mid=new THREE.Vector3().lerpVectors(base,top,0.6);mountGroup.add(cylBetween(base,mid,r,tMat));mountGroup.add(cylBetween(mid,top,r*0.45,matDamperRod));}
    else{mountGroup.add(cylBetween(base,top,r*0.75,tMat));}
    [top,base].forEach(pt=>{const sp=new THREE.Mesh(new THREE.SphereGeometry(7,10,10),tMat);sp.position.copy(pt);mountGroup.add(sp);});
  });
}
function rebuild(){readParams();buildTubDrum();buildSusp();buildMounts();}

// 슬라이더 바인딩
function bindCtrl(id,vid,unit,dec){
  const el=document.getElementById(id);
  const upd=()=>{const e=document.getElementById(vid);if(e)e.innerHTML=(+el.value).toFixed(dec)+'<span class="u">'+unit+'</span>';};
  el.addEventListener('input',()=>{upd();rebuild();});upd();
}
bindCtrl('DrumR','vDrumR','mm',0);bindCtrl('Tilt','vTilt','°',1);
bindCtrl('SpR_l','vSpR_l','mm',0);bindCtrl('SpR_a','vSpR_a','°',1);
bindCtrl('SpL_l','vSpL_l','mm',0);bindCtrl('SpL_a','vSpL_a','°',1);
bindCtrl('SpR_f','vSpR_f','kgf/mm',1);bindCtrl('SpL_f','vSpL_f','kgf/mm',1);
bindCtrl('DrumM','vDrumM','kg',1);bindCtrl('TubM','vTubM','kg',1);
DAMPERS.forEach(d=>{
  bindCtrl('D_'+d.id+'_l','vD_'+d.id+'_l','mm',0);
  bindCtrl('D_'+d.id+'_a','vD_'+d.id+'_a','°',1);
  bindCtrl('D_'+d.id+'_f','vD_'+d.id+'_f','N',0);
  document.getElementById('D_'+d.id+'_t').addEventListener('change',rebuild);
});
BUSH.concat(GASK).forEach(b=>bindCtrl(b[0],'v'+b[0],b[2],b[7]));
TDSL.forEach(t=>{['f','l','a'].forEach((k,i)=>bindCtrl('Tds_'+t.id+'_'+k,'vTds_'+t.id+'_'+k,['N','mm','°'][i],i===2?1:0));document.getElementById('Tds_'+t.id+'_t').addEventListener('change',rebuild);});

// 아코디언
document.querySelectorAll('[data-acc] .acc-h').forEach(h=>h.addEventListener('click',()=>h.parentElement.classList.toggle('open')));

// 궤도 컨트롤
let theta=0.7,phi=1.15,radius=1900,drag=false,px=0,py=0;
function applyCam(){camera.position.set(radius*Math.sin(phi)*Math.sin(theta),radius*Math.cos(phi),radius*Math.sin(phi)*Math.cos(theta));camera.lookAt(0,0,0);}
cv.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;});
addEventListener('pointerup',()=>drag=false);
addEventListener('pointermove',e=>{if(!drag)return;theta-=(e.clientX-px)*0.008;phi-=(e.clientY-py)*0.008;phi=Math.max(0.25,Math.min(Math.PI-0.25,phi));px=e.clientX;py=e.clientY;});
cv.addEventListener('wheel',e=>{e.preventDefault();radius=Math.max(900,Math.min(4200,radius+e.deltaY*1.1));},{passive:false});

// 진동
let vibOn=false,t0=0;
document.getElementById('btnVib').addEventListener('click',e=>{vibOn=!vibOn;e.target.classList.toggle('on',vibOn);e.target.textContent=vibOn?'■ 정지':'▶ 진동';t0=performance.now();});
document.getElementById('btnReset').addEventListener('click',()=>{theta=0.7;phi=1.15;radius=1900;});

function resize(){const w=stage.clientWidth,h=stage.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
addEventListener('resize',resize);

function tick(){
  requestAnimationFrame(tick);
  if(vibOn){const t=(performance.now()-t0)/1000;root.position.x=Math.sin(t*7.5)*24;root.position.y=Math.cos(t*7.5)*15;}
  else root.position.set(0,0,0);
  applyCam();renderer.render(scene,camera);
}
buildCabinet();rebuild();resize();applyCam();tick();
</script>
